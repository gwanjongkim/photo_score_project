experiment:
  name: rgnet_paper_v1_aadb_regression
  model_variant: rgnet_paper_v1
  label: RGNet-paper-v1 approximation
  output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509
  train_output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509/full_train
  official_reproduction: false
  note: >
    Paper-oriented RGNet AADB regression v1 track. This is not the official
    paper implementation or official weights.

data:
  train_csv: data/processed/aadb/train.csv
  val_csv: data/processed/aadb/val.csv
  test_csv: data/processed/aadb/test.csv
  image_dir: data/raw/aadb/images
  image_col: image_path
  target_col: score
  target_scale: [0.0, 1.0]

model:
  backbone: DenseNet121
  backbone_weights: imagenet
  image_size: 256
  region_node_definition: spatial positions from post-ASPP DenseNet121 feature map
  region_dim: 256
  graph_units: 256
  graph_blocks: 3
  graph_temperature: 0.25
  graph_dropout: 0.1
  head_dropout: 0.3
  context_module: aspp
  dilation_rates: [1, 3, 6, 12, 18]
  adjacency: cosine similarity with row-wise softmax normalization
  graph_convolution: residual graph convolution
  region_score_head: per-node sigmoid scalar score
  aggregation: lse
  lse_r: 4
  regression_head: region scores aggregated to one scalar score in [0, 1]
  approximation_note: >
    Exact paper RegionGraph and DenseASPP details are ambiguous in local
    evidence. This v1 approximation uses ASPP, spatial feature positions as
    region nodes, dense cosine similarity adjacency, softmax-normalized edges,
    residual graph convolution blocks, and Log-Sum-Exp aggregation.

training:
  loss: mse
  metrics: [mae]
  optimizer: adam
  batch_size: 8
  epochs: 20
  learning_rate: 0.0001
  early_stopping_patience: 3
  early_stopping_monitor: val_loss
  restore_best_weights: true
  seed: 42
  verify_save_load: true

evaluation:
  output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509/eval
  model_name: rgnet_paper_v1_aadb_regression
  batch_size: 16
  metrics: [srcc, plcc, mae, rmse, mse, seconds_per_image]

smoke_test:
  train_output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509/smoke_train
  eval_output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509/smoke_eval
  backbone_weights: none
  max_train_samples: 16
  max_val_samples: 8
  max_test_samples: 8
  epochs: 1
  batch_size: 2

mid_run:
  train_output_dir: outputs/rgnet_paper_v1_aadb_regression_20260509/mid_train
  max_train_samples: 512
  max_val_samples: 128
  epochs: 3
  batch_size: 8
  backbone_weights: imagenet
