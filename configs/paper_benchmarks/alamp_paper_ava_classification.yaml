experiment:
  name: alamp_paper_ava_classification
  model_variant: A-LAMP-paper-AVA-v0
  label: A-LAMP-paper-AVA-v0 approximation
  output_dir: outputs/alamp_paper_ava_classification_20260511
  train_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_train/v0_a
  official_reproduction: false
  note: >
    A-LAMP-paper-oriented approximation for an A-LAMP-style AVA classification
    model. This is not an official reproduction and does not use official
    author weights.

data:
  train_csv: data/processed/ava/train.csv
  val_csv: data/processed/ava/val.csv
  test_csv: data/processed/ava/test.csv
  image_dir: data/raw/ava/images
  image_col: image_path
  score_col: mean_score
  label_rule: paper_strict
  label_threshold: 5.0

model:
  variant: v0_a
  backbone: VGG16
  backbone_weights: imagenet
  train_backbone: false
  shared_patch_backbone: true
  patch_count: 5
  patch_size: 224
  image_size_patch: 224
  global_size: 384
  image_size_global: 384
  include_global_branch: false
  include_layout_features: false
  layout_feature_dim: 10
  feature_dim: 256
  dropout: 0.3
  patch_selection: adaptive_heuristic
  approximation_note: >
    Uses deterministic adaptive patch selection based on edge strength,
    luminance variance, color variance, and overlap reduction. Exact
    object/global attribute graph is not implemented in v0. Exact saliency-map
    pipeline is not implemented in v0.

training:
  loss: binary_crossentropy
  metrics: [binary_accuracy, auc, precision, recall]
  optimizer: adam
  batch_size: 4
  epochs: 20
  learning_rate: 0.0001
  early_stopping_patience: 3
  early_stopping_monitor: val_loss
  restore_best_weights: true
  seed: 42
  verify_save_load: true

evaluation:
  output_dir: outputs/alamp_paper_ava_classification_20260511/mid_eval/v0_a
  model_name: alamp_paper_ava_v0
  batch_size: 4
  metrics: [accuracy, precision, recall, f1, roc_auc, average_precision, bce_loss, confusion_matrix, seconds_per_image]

smoke_test:
  train_output_dir: outputs/alamp_paper_ava_classification_20260511/smoke_train/v0_a
  eval_output_dir: outputs/alamp_paper_ava_classification_20260511/smoke_eval/v0_a
  backbone_weights: none
  max_train_samples: 64
  max_val_samples: 32
  max_test_samples: 64
  epochs: 1
  batch_size: 2

mid_run:
  max_train_samples: 4096
  max_val_samples: 1024
  max_test_samples: 1024
  epochs: 3
  batch_size: 4
  backbone_weights: imagenet
  label_rule: paper_strict
  candidates:
    - name: v0_a
      variant: v0_a
      train_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_train/v0_a
      eval_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_eval/v0_a
    - name: v0_b
      variant: v0_b
      train_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_train/v0_b
      eval_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_eval/v0_b
      optional: true
    - name: v0_b_fixed
      variant: v0_b
      train_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_train/v0_b_fixed
      eval_output_dir: outputs/alamp_paper_ava_classification_20260511/mid_eval/v0_b_fixed
      note: fixed-shape v0_b fusion without dynamic per-patch attention.
